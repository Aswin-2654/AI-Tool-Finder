<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tool Details - AI Tool Finder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
</head>
<body class="bg-base-100 min-h-screen">
  <div class="navbar bg-base-200 shadow">
    <div class="flex-1">
      <a href="index.html" class="btn btn-ghost normal-case text-xl">← Back to Home</a>
    </div>
  </div>

  <div class="container mx-auto p-6 max-w-4xl">
    <div id="toolDetail" class="card bg-base-200 shadow-xl">
      <div class="card-body">
        <!-- Will be filled by JS -->
        <div class="skeleton h-32 w-full mb-6"></div>
      </div>
    </div>

    <!-- Submit Review -->
    <div class="card bg-base-200 shadow-xl mt-8">
      <div class="card-body">
        <h3 class="text-2xl font-bold mb-6">Submit Your Review</h3>
        <div class="grid gap-4">
          <input type="number" id="userRating" min="1" max="5" placeholder="Rating (1-5)" class="input input-bordered" />
          <textarea id="comment" placeholder="Your comment (optional)" class="textarea textarea-bordered h-32"></textarea>
          <button onclick="submitReview()" class="btn btn-success">Submit Review</button>
        </div>
        <p id="reviewMessage" class="mt-4 text-info text-center font-medium"></p>
      </div>
    </div>

    <!-- Reviews -->
    <h3 class="text-2xl font-bold my-8">User Reviews</h3>
    <div id="reviewsList" class="space-y-4">
      <p class="text-center text-gray-500">Loading reviews...</p>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const toolId = urlParams.get('id');
    if (toolId) fetchToolDetail(toolId);
  </script>
</body>
